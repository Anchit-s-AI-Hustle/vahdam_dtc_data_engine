name: CI
on:
  push: { branches: [main] }
  pull_request: {}
jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install duckdb psycopg2-binary ruff
      - name: Lint (best-effort)
        run: ruff check --select E9,F63,F7,F82 --output-format=concise . || true
      - name: Smoke import — sync_to_supabase
        run: python -c "import ast; ast.parse(open('ingest/sync_to_supabase.py').read()); print('sync_to_supabase parses')"
